image: node:20

stages:
  - deploy

variables:
  PNPM_CACHE_FOLDER: .pnpm-store

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .pnpm-store/

deploy_pages:
  stage: deploy
  tags:
    - k8s
    - instance
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH'
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.30.2 --activate
    - pnpm config set store-dir "$PNPM_CACHE_FOLDER"
    - pnpm -C app install --frozen-lockfile
  script:
    - test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID"; exit 1)
    - test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN"; exit 1)
    - test -n "$CLOUDFLARE_PAGES_PROJECT" || (echo "Missing CLOUDFLARE_PAGES_PROJECT"; exit 1)
    - pnpm -C app build
    - npx wrangler pages deploy app/build --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch "$CI_COMMIT_REF_NAME"
